# render.yaml — إعداد النشر على Render.com
# ضع هذا الملف في جذر مجلد sawa-backend

services:
  - type: web
    name: sawa-backend
    runtime: python
    region: frankfurt  # أقرب لمنطقتنا العربية
    plan: starter       # $7/شهر — 2GB RAM — يكفي لـ Whisper base
    
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    
    # متغيرات البيئة — ستضيفها يدوياً في لوحة Render
    envVars:
      - key: WHISPER_MODEL
        value: base          # base يعمل على 2GB RAM — large-v3 يحتاج 4GB
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8
      - key: ENVIRONMENT
        value: production
      - key: UPLOAD_DIR
        value: /tmp/uploads  # مؤقت — سنستخدم R2 لاحقاً
      - key: DATABASE_URL
        sync: false          # ستضيفها يدوياً من Supabase
      - key: SECRET_KEY
        generateValue: true  # Render يولّدها تلقائياً
      - key: ANTHROPIC_API_KEY
        sync: false          # ستضيفها يدوياً
      - key: FRONTEND_URL
        sync: false          # رابط Vercel — ستضيفه بعد النشر

    # قرص مستمر للملفات المؤقتة
    disk:
      name: uploads
      mountPath: /tmp/uploads
      sizeGB: 5              # $1/شهر إضافي — يكفي للبداية
